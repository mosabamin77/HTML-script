<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Pizza">
        </div>
        <div class="form-section">
            <div class="brand"><i class="fas fa-hamburger"></i><span>FoodDash</span></div>
            <div class="header-text"><h1>Welcome Back</h1><p>Please enter your details to sign in.</p></div>
            
            <div id="message-box" style="display:none; padding: 10px; margin-bottom: 15px; border-radius: 5px; font-size: 0.9rem;"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Email address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <i class="fas fa-eye-slash toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn" id="loginBtn">Log In</button>
                
                <div class="divider"><span>Or continue with</span></div>

<div class="social-buttons">
    <button type="button" class="social-btn google" onclick="handleSocialLogin('Google')">
        <i class="fab fa-google"></i> Google
    </button>
    <button type="button" class="social-btn facebook" onclick="handleSocialLogin('Facebook')">
        <i class="fab fa-facebook-f"></i> Facebook
    </button>
</div>
                <p class="footer-text">Don't have an account? <a href="signup.html" class="link">Sign Up</a></p>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
