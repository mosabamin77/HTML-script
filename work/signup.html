<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDash - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Pizza">
        </div>
        <div class="form-section">
            <div class="brand"><i class="fas fa-hamburger"></i><span>FoodDash</span></div>
            <div class="header-text"><h1>Get Started</h1><p>Create account to complete your order.</p></div>
            <form>
                <div class="input-group"><label>Full Name</label><input type="text" placeholder="Alex Doe"></div>
                <div class="input-group"><label>Email address</label><input type="email" placeholder="you@example.com"></div>
                <div class="input-group"><label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="pass" placeholder="••••••••">
                        <i class="fas fa-eye-slash toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>
                <button type="button" onclick="handleRegister()" class="submit-btn">Create Account</button>
                <p class="footer-text">Already have an account? <a href="login.html" class="link">Log In</a></p>
            </form>
        </div>
    </div>
    <script src="signup.js"></script>
</body>
</html>
